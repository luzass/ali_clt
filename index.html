<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Simulação Empréstimo CLT</title>

  <style>
    :root {
      --bg: #050505;
      --card: #111111;
      --card-2: #171717;
      --orange: #ff7a00;
      --orange-dark: #d96500;
      --text: #ffffff;
      --muted: #b8b8b8;
      --border: rgba(255, 122, 0, 0.22);
      --danger: #ff4d4d;
      --success: #25d366;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255, 122, 0, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 122, 0, 0.10), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 520px;
    }

    .logo-area {
      display: flex;
      justify-content: center;
      margin-bottom: 22px;
    }

    .logo-box {
      width: 170px;
      height: 72px;
      border: 1px dashed rgba(255, 255, 255, 0.28);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
    }

    .logo-box img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .card {
      background: linear-gradient(180deg, var(--card), var(--card-2));
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 30px;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 4px;
      width: 100%;
      background: linear-gradient(90deg, var(--orange), transparent);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 122, 0, 0.12);
      border: 1px solid rgba(255, 122, 0, 0.28);
      color: var(--orange);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 30px;
      line-height: 1.12;
      margin-bottom: 14px;
    }

    h2 {
      font-size: 25px;
      line-height: 1.18;
      margin-bottom: 14px;
    }

    p {
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      margin-bottom: 18px;
    }

    .highlight {
      color: var(--orange);
      font-weight: 700;
    }

    .progress {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      overflow: hidden;
      margin-bottom: 22px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--orange), #ffb000);
      transition: width 0.25s ease;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #e8e8e8;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      background: #080808;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--text);
      border-radius: 15px;
      padding: 15px 16px;
      font-size: 16px;
      outline: none;
      transition: 0.2s;
    }

    input:focus,
    select:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px rgba(255, 122, 0, 0.12);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #111;
      background: var(--orange);
      transition: 0.2s;
      margin-top: 8px;
    }

    .btn:hover {
      background: var(--orange-dark);
      transform: translateY(-1px);
    }

    .btn-option {
      width: 100%;
      text-align: left;
      background: #090909;
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
      transition: 0.2s;
    }

    .btn-option:hover {
      border-color: var(--orange);
      background: rgba(255, 122, 0, 0.09);
    }

    .btn-whatsapp {
      background: var(--success);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-whatsapp:hover {
      background: #1ebe5d;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
      margin-top: 14px;
      margin-bottom: 0;
    }

    .error {
      display: none;
      color: #fff;
      background: rgba(255, 77, 77, 0.14);
      border: 1px solid rgba(255, 77, 77, 0.32);
      padding: 12px;
      border-radius: 14px;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .reprovado {
      border-color: rgba(255, 77, 77, 0.35);
    }

    .aprovado {
      border-color: rgba(37, 211, 102, 0.38);
    }

    .loading {
      opacity: 0.65;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
        align-items: flex-start;
      }

      .page {
        margin-top: 18px;
      }

      .card {
        padding: 24px;
        border-radius: 24px;
      }

      h1 {
        font-size: 27px;
      }

      h2 {
        font-size: 23px;
      }

      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="logo-area">
      <div class="logo-box">
        <!-- 
          Para colocar sua logo:
          1. Coloque a imagem na pasta do projeto.
          2. Troque o texto abaixo por:
          <img src="./logo.png" alt="Logo da empresa">
        -->
        Sua logo aqui
      </div>
    </div>

    <section class="card" id="card">
      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div id="app"></div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://roumctloubmhokchacvc.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJvdW1jdGxvdWJtaG9rY2hhY3ZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1MDc3MDksImV4cCI6MjA4NzA4MzcwOX0.DwR_iN_LehBwAgK8svbsU9dVqHsoJk7ArNHeOOEGGtU";

    const WHATSAPP_NUMERO = "5561991164066";

    let leadId = localStorage.getItem("lead_clt_id") || crypto.randomUUID();
    let leadToken = localStorage.getItem("lead_clt_token") || crypto.randomUUID();

    localStorage.setItem("lead_clt_id", leadId);
    localStorage.setItem("lead_clt_token", leadToken);

    let step = 0;

    const lead = {
      id: leadId,
      lead_token: leadToken,
      nome: "",
      telefone: "",
      trabalha_carteira_assinada: null,
      data_inicio_mes: null,
      data_inicio_ano: null,
      tempo_empresa_meses: null,
      atende_tempo_minimo: null,
      empresa_mais_2_anos: null,
      ja_fez_consignado_clt: "",
      margem_consignavel: "",
      valor_emprestimo: null,
      status: "iniciado",
      etapa_atual: "inicio",
      motivo_reprovacao: "",
      user_agent: navigator.userAgent,
      pagina_origem: window.location.href
    };

    const app = document.getElementById("app");
    const card = document.getElementById("card");
    const progressBar = document.getElementById("progressBar");

    const totalSteps = 8;

    function setProgress() {
      const percent = Math.min((step / totalSteps) * 100, 100);
      progressBar.style.width = percent + "%";
    }

    function render(html) {
      setProgress();
      app.innerHTML = html;
    }

    function showError(message) {
      const error = document.getElementById("error");
      if (error) {
        error.textContent = message;
        error.style.display = "block";
      }
    }

    function cleanPhone(value) {
      return value.replace(/\D/g, "");
    }

    function formatMoney(value) {
      const onlyNumbers = value.replace(/\D/g, "");
      const number = Number(onlyNumbers) / 100;

      return number.toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function parseMoneyToNumber(value) {
      const onlyNumbers = value.replace(/\D/g, "");
      return Number(onlyNumbers) / 100;
    }

    function calcularMesesNaEmpresa(mes, ano) {
      const hoje = new Date();
      const mesAtual = hoje.getMonth() + 1;
      const anoAtual = hoje.getFullYear();

      return (anoAtual - ano) * 12 + (mesAtual - mes);
    }

    async function supabaseInsertInicial() {
      const url = `${SUPABASE_URL}/rest/v1/clientes_trafego_clt`;

      const response = await fetch(url, {
        method: "POST",
        headers: {
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "Content-Type": "application/json",
          "Prefer": "resolution=merge-duplicates",
          "x-lead-token": leadToken
        },
        body: JSON.stringify(lead)
      });

      if (!response.ok) {
        console.error("Erro ao inserir lead:", await response.text());
      }
    }

    async function salvarLead(dados = {}) {
      Object.assign(lead, dados);

      const url = `${SUPABASE_URL}/rest/v1/clientes_trafego_clt?id=eq.${leadId}`;

      card.classList.add("loading");

      try {
        const response = await fetch(url, {
          method: "PATCH",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json",
            "x-lead-token": leadToken
          },
          body: JSON.stringify({
            ...dados,
            etapa_atual: lead.etapa_atual,
            status: lead.status,
            motivo_reprovacao: lead.motivo_reprovacao
          })
        });

        if (!response.ok) {
          console.error("Erro ao salvar lead:", await response.text());
        }
      } catch (error) {
        console.error("Erro de conexão com Supabase:", error);
      } finally {
        card.classList.remove("loading");
      }
    }

    async function iniciarLead() {
      await supabaseInsertInicial();
      step = 1;
      telaInicial();
    }

    function telaInicial() {
      render(`
        <div class="badge">Empréstimo CLT</div>

        <h1>Simule seu Empréstimo CLT de forma rápida e segura</h1>

        <p>
          O Empréstimo CLT é uma opção de crédito para quem trabalha com 
          <span class="highlight">carteira assinada</span>. A análise considera seu vínculo empregatício,
          tempo de empresa e margem consignável disponível.
        </p>

        <p>
          Responda algumas perguntas rápidas para verificar se você atende aos principais requisitos.
        </p>

        <button class="btn" onclick="telaNomeTelefone()">Quero Simular!</button>

        <p class="small">O pré-cadastro leva menos de 1 minuto.</p>
      `);
    }

    function telaNomeTelefone() {
      step = 2;

      render(`
        <h2>Primeiro, informe seus dados</h2>

        <p>Precisamos do seu nome e telefone para continuar sua simulação.</p>

        <div class="error" id="error"></div>

        <div class="field">
          <label>Nome completo</label>
          <input id="nome" type="text" placeholder="Digite seu nome" autocomplete="name">
        </div>

        <div class="field">
          <label>Telefone / WhatsApp</label>
          <input id="telefone" type="tel" placeholder="(00) 00000-0000" autocomplete="tel">
        </div>

        <button class="btn" onclick="validarNomeTelefone()">Continuar</button>
      `);
    }

    async function validarNomeTelefone() {
      const nome = document.getElementById("nome").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const telefoneLimpo = cleanPhone(telefone);

      if (nome.length < 3) {
        showError("Digite seu nome completo para continuar.");
        return;
      }

      if (telefoneLimpo.length < 10) {
        showError("Digite um telefone válido para continuar.");
        return;
      }

      await salvarLead({
        nome,
        telefone,
        etapa_atual: "dados_pessoais",
        status: "em_andamento"
      });

      telaCarteiraAssinada();
    }

    function telaCarteiraAssinada() {
      step = 3;

      render(`
        <h2>Você trabalha de carteira assinada?</h2>

        <p>Esse é um dos principais requisitos para a análise do Empréstimo CLT.</p>

        <button class="btn-option" onclick="responderCarteira(true)">Sim, trabalho de carteira assinada</button>
        <button class="btn-option" onclick="responderCarteira(false)">Não trabalho de carteira assinada</button>
      `);
    }

    async function responderCarteira(valor) {
      if (!valor) {
        await salvarLead({
          trabalha_carteira_assinada: false,
          etapa_atual: "carteira_assinada",
          status: "reprovado",
          motivo_reprovacao: "Não trabalha de carteira assinada"
        });

        telaReprovado();
        return;
      }

      await salvarLead({
        trabalha_carteira_assinada: true,
        etapa_atual: "carteira_assinada",
        status: "em_andamento",
        motivo_reprovacao: ""
      });

      telaTempoEmpresa();
    }

    function telaTempoEmpresa() {
      step = 4;

      const anoAtual = new Date().getFullYear();

      render(`
        <h2>Quando você entrou na empresa em que trabalha?</h2>

        <p>Informe o mês e o ano de entrada na empresa atual.</p>

        <div class="error" id="error"></div>

        <div class="row">
          <div class="field">
            <label>Mês</label>
            <select id="mes">
              <option value="">Selecione</option>
              <option value="1">Janeiro</option>
              <option value="2">Fevereiro</option>
              <option value="3">Março</option>
              <option value="4">Abril</option>
              <option value="5">Maio</option>
              <option value="6">Junho</option>
              <option value="7">Julho</option>
              <option value="8">Agosto</option>
              <option value="9">Setembro</option>
              <option value="10">Outubro</option>
              <option value="11">Novembro</option>
              <option value="12">Dezembro</option>
            </select>
          </div>

          <div class="field">
            <label>Ano</label>
            <input id="ano" type="number" placeholder="${anoAtual}" min="1970" max="${anoAtual}">
          </div>
        </div>

        <button class="btn" onclick="validarTempoEmpresa()">Continuar</button>
      `);
    }

    async function validarTempoEmpresa() {
      const mes = Number(document.getElementById("mes").value);
      const ano = Number(document.getElementById("ano").value);

      const hoje = new Date();
      const anoAtual = hoje.getFullYear();

      if (!mes || !ano) {
        showError("Informe o mês e o ano de entrada na empresa.");
        return;
      }

      if (ano < 1970 || ano > anoAtual) {
        showError("Informe um ano válido.");
        return;
      }

      const mesesNaEmpresa = calcularMesesNaEmpresa(mes, ano);
      const atendeTempo = mesesNaEmpresa >= 9;

      if (!atendeTempo) {
        await salvarLead({
          data_inicio_mes: mes,
          data_inicio_ano: ano,
          tempo_empresa_meses: mesesNaEmpresa,
          atende_tempo_minimo: false,
          etapa_atual: "tempo_empresa",
          status: "reprovado",
          motivo_reprovacao: "Menos de 9 meses na empresa atual"
        });

        telaReprovado();
        return;
      }

      await salvarLead({
        data_inicio_mes: mes,
        data_inicio_ano: ano,
        tempo_empresa_meses: mesesNaEmpresa,
        atende_tempo_minimo: true,
        etapa_atual: "tempo_empresa",
        status: "em_andamento",
        motivo_reprovacao: ""
      });

      telaEmpresaMaisDoisAnos();
    }

    function telaEmpresaMaisDoisAnos() {
      step = 5;

      render(`
        <h2>A empresa onde você trabalha existe há mais de 2 anos?</h2>

        <p>Essa informação ajuda na análise inicial do seu pré-cadastro.</p>

        <button class="btn-option" onclick="responderEmpresaTempo(true)">Sim, existe há mais de 2 anos</button>
        <button class="btn-option" onclick="responderEmpresaTempo(false)">Não existe há mais de 2 anos</button>
      `);
    }

    async function responderEmpresaTempo(valor) {
      if (!valor) {
        await salvarLead({
          empresa_mais_2_anos: false,
          etapa_atual: "empresa_mais_2_anos",
          status: "reprovado",
          motivo_reprovacao: "Empresa com menos de 2 anos"
        });

        telaReprovado();
        return;
      }

      await salvarLead({
        empresa_mais_2_anos: true,
        etapa_atual: "empresa_mais_2_anos",
        status: "em_andamento",
        motivo_reprovacao: ""
      });

      telaConsignadoAntes();
    }

    function telaConsignadoAntes() {
      step = 6;

      render(`
        <h2>Você já fez empréstimo consignado CLT antes?</h2>

        <p>Essa pergunta ajuda nossos colaboradores a entenderem melhor seu perfil.</p>

        <button class="btn-option" onclick="responderConsignado('Sim, já realizei')">Sim, já realizei</button>
        <button class="btn-option" onclick="responderConsignado('Não, nunca realizei')">Não, nunca realizei</button>
      `);
    }

    async function responderConsignado(valor) {
      await salvarLead({
        ja_fez_consignado_clt: valor,
        etapa_atual: "consignado_clt_antes",
        status: "em_andamento"
      });

      telaMargem();
    }

    function telaMargem() {
      step = 7;

      render(`
        <h2>Você tem margem consignável disponível?</h2>

        <p>
          Margem consignável é a parte do seu salário que pode ser comprometida com parcelas de empréstimo.
        </p>

        <button class="btn-option" onclick="responderMargem('Tenho Margem')">Tenho Margem</button>
        <button class="btn-option" onclick="responderMargem('Não sei, quero consultar')">Não sei, quero consultar</button>
        <button class="btn-option" onclick="responderMargem('Não tenho margem')">Não tenho margem</button>
      `);
    }

    async function responderMargem(valor) {
      if (valor === "Não tenho margem") {
        await salvarLead({
          margem_consignavel: valor,
          etapa_atual: "margem_consignavel",
          status: "reprovado",
          motivo_reprovacao: "Não possui margem consignável"
        });

        telaReprovado();
        return;
      }

      await salvarLead({
        margem_consignavel: valor,
        etapa_atual: "margem_consignavel",
        status: "pre_aprovado",
        motivo_reprovacao: ""
      });

      telaPreAprovado();
    }

    function telaPreAprovado() {
      step = 8;

      render(`
        <div class="badge">Pré-cadastro aprovado</div>

        <h2>Pré-cadastro aprovado!</h2>

        <p>
          Agora diga quanto você deseja de empréstimo e clique em continuar para nossos colaboradores finalizarem seu cadastro.
        </p>

        <div class="error" id="error"></div>

        <div class="field">
          <label>Valor do empréstimo</label>
          <input id="valorEmprestimo" type="text" placeholder="R$ 0,00" inputmode="numeric">
        </div>

        <button class="btn btn-whatsapp" onclick="finalizarWhatsapp()">
          <span>☘</span>
          Continuar pelo WhatsApp
        </button>
      `);

      const input = document.getElementById("valorEmprestimo");

      input.addEventListener("input", function () {
        this.value = formatMoney(this.value);
      });

      card.classList.add("aprovado");
    }

    async function finalizarWhatsapp() {
      const valorInput = document.getElementById("valorEmprestimo").value.trim();
      const valor = parseMoneyToNumber(valorInput);

      if (!valor || valor <= 0) {
        showError("Informe o valor desejado para continuar.");
        return;
      }

      await salvarLead({
        valor_emprestimo: valor,
        etapa_atual: "finalizado_whatsapp",
        status: "aguardando_atendimento"
      });

      const mensagem = encodeURIComponent(
        `Olá! Fiz meu pré-cadastro para Empréstimo CLT e fui pré-aprovado.\n\n` +
        `Nome: ${lead.nome}\n` +
        `Telefone: ${lead.telefone}\n` +
        `Valor desejado: ${valorInput}\n\n` +
        `Gostaria de finalizar meu cadastro.`
      );

      window.location.href = `https://wa.me/${WHATSAPP_NUMERO}?text=${mensagem}`;
    }

    function telaReprovado() {
      step = 8;
      card.classList.add("reprovado");

      render(`
        <h2>Obrigado pelas informações</h2>

        <p>
          Infelizmente você não atende aos requisitos do Empréstimo CLT, entretanto nossos atendentes irão entrar em contato com você para oferecer outras formas de empréstimo!
        </p>

        <button class="btn" onclick="window.location.reload()">Refazer simulação</button>
      `);
    }

    iniciarLead();
  </script>
</body>
</html>
